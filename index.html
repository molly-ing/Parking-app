<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나 여기있어</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background: #f5f5f5; }
    #root { width: 100%; min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // SVG 자동차 컴포넌트
    const CarSvg = ({ color = '#FF6B6B', size = 80 }) => (
      <svg width={size} height={size} viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="60" rx="35" ry="15" fill={color} opacity="0.3"/>
        <rect x="20" y="45" width="60" height="25" rx="8" fill={color}/>
        <rect x="30" y="35" width="40" height="15" rx="6" fill={color}/>
        <circle cx="30" cy="70" r="8" fill="#333"/>
        <circle cx="70" cy="70" r="8" fill="#333"/>
        <circle cx="35" cy="48" r="3" fill="#fff"/>
        <circle cx="45" cy="48" r="3" fill="#fff"/>
        <path d="M 38 52 Q 42 54 46 52" stroke="#333" strokeWidth="1.5" fill="none"/>
      </svg>
    );

    function ParkingApp() {
      const [tab, setTab] = useState('record');
      const [parkingRecords, setParkingRecords] = useState([]);
      const [photo, setPhoto] = useState(null);
      const [memo, setMemo] = useState('');
      const [parkingLocation, setParkingLocation] = useState('');
      const [parkingZone, setParkingZone] = useState('');
      const [alertMessage, setAlertMessage] = useState('');
      const [alertType, setAlertType] = useState('');
      const [mapModal, setMapModal] = useState(null);
      const [currentTime, setCurrentTime] = useState(new Date());
      const [carName, setCarName] = useState('붕붕이');
      const [carColor, setCarColor] = useState('#FF6B6B');
      const [notificationEnabled, setNotificationEnabled] = useState(true);
      const [firstVisit, setFirstVisit] = useState(true);
      const [showLocationError, setShowLocationError] = useState(false);

      useEffect(() => {
        loadRecords();
        loadSettings();
        const timeInterval = setInterval(() => setCurrentTime(new Date()), 1000);
        return () => clearInterval(timeInterval);
      }, []);

      const loadRecords = () => {
        try {
          const saved = localStorage.getItem('parking-records');
          if (saved) setParkingRecords(JSON.parse(saved));
        } catch (error) {
          console.log('No saved records');
        }
      };

      const loadSettings = () => {
        try {
          const savedName = localStorage.getItem('car-name');
          const savedColor = localStorage.getItem('car-color');
          if (savedName) setCarName(savedName);
          if (savedColor) setCarColor(savedColor);
        } catch (error) {
          console.log('No saved settings');
        }
      };

      const showAlert = (msg, type) => {
        setAlertMessage(msg);
        setAlertType(type);
        setTimeout(() => setAlertMessage(''), 2000);
      };

      const handlePhotoSelect = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            setPhoto(event.target.result);
            showAlert('✅ 사진이 저장되었어요', 'info');
          };
          reader.readAsDataURL(file);
        }
      };

      const saveParking = () => {
        if (!photo) {
          showAlert('❌ 사진을 먼저 촬영해주세요!', 'error');
          return;
        }

        const newRecord = {
          id: Date.now(),
          photo,
          location: parkingLocation,
          zone: parkingZone,
          memo,
          timestamp: new Date().toISOString(),
          found: false,
        };

        const updated = [newRecord, ...parkingRecords];
        setParkingRecords(updated);
        localStorage.setItem('parking-records', JSON.stringify(updated));

        setPhoto(null);
        setParkingLocation('');
        setParkingZone('');
        setMemo('');
        
        showAlert('✅ 주차 위치가 저장되었어요!', 'success');
      };

      const deleteRecord = (id) => {
        const updated = parkingRecords.filter(r => r.id !== id);
        setParkingRecords(updated);
        localStorage.setItem('parking-records', JSON.stringify(updated));
        showAlert('✅ 삭제되었어요', 'info');
      };

      const getCarEmotion = (timestamp) => {
        const now = new Date();
        const diff = (now - new Date(timestamp)) / (1000 * 60);
        if (diff < 120) return '😊';
        if (diff < 240) return '😢';
        return '😴';
      };

      const getTimeString = (timestamp) => {
        const now = new Date();
        const diff = Math.floor((now - new Date(timestamp)) / (1000 * 60));
        if (diff < 1) return '방금 전';
        if (diff < 60) return `${diff}분 전`;
        const hours = Math.floor(diff / 60);
        if (hours < 24) return `${hours}시간 전`;
        return `${Math.floor(hours / 24)}일 전`;
      };

      if (firstVisit) {
        return (
          <div style={{ background: 'linear-gradient(135deg, #667EEA 0%, #764BA2 100%)', minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '2rem' }}>
            <div style={{ marginBottom: '2rem', position: 'relative', width: '300px', height: '250px', display: 'flex', alignItems: 'flex-end', justifyContent: 'center' }}>
              <div style={{ position: 'absolute', top: '0', background: 'white', borderRadius: '25px', padding: '24px 40px', boxShadow: '0 8px 24px rgba(0,0,0,0.2)', minWidth: '240px', textAlign: 'center', zIndex: 10 }}>
                <div style={{ position: 'absolute', bottom: '-15px', left: '50%', transform: 'translateX(-50%)', width: 0, height: 0, borderLeft: '15px solid transparent', borderTop: '15px solid white', borderRight: '15px solid transparent' }}></div>
                <div style={{ fontSize: '32px', fontWeight: 700, color: '#667EEA', letterSpacing: '1px', fontFamily: "'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif", lineHeight: '1.4' }}>
                  나 여기있어
                </div>
              </div>
              <div style={{ position: 'absolute', bottom: '0' }}>
                <CarSvg color="#FF6B6B" size={120} />
              </div>
            </div>

            <p style={{ fontSize: '18px', color: 'rgba(255,255,255,0.9)', textAlign: 'center', margin: '2rem 0', lineHeight: '1.6' }}>
              당신의 파킹 파트너<br/>
              <span style={{ fontSize: '14px', opacity: 0.8 }}>차를 주차하고 위치를 기록해주세요</span>
            </p>

            <button onClick={() => { setFirstVisit(false); localStorage.setItem('first-visit', 'false'); }} style={{ padding: '16px 48px', background: 'white', color: '#667EEA', border: 'none', borderRadius: '30px', fontSize: '16px', fontWeight: 700, cursor: 'pointer', boxShadow: '0 8px 24px rgba(0,0,0,0.2)' }}>
              시작하기 🚗
            </button>
          </div>
        );
      }

      return (
        <div style={{ background: '#f5f5f5', minHeight: '100vh', paddingBottom: '80px' }}>
          <div style={{ background: 'linear-gradient(135deg, #667EEA 0%, #764BA2 100%)', color: 'white', padding: '2rem 1.5rem', textAlign: 'center' }}>
            <h1 style={{ margin: '0 0 0.5rem 0', fontSize: '32px', fontWeight: 700 }}>🚗 나 여기있어</h1>
            <p style={{ margin: 0, fontSize: '14px', opacity: 0.9 }}>이곳에서 당신을 기다리고 있어요</p>
          </div>

          <div style={{ padding: '1.5rem' }}>
            {tab === 'record' && (
              <>
                <div style={{ marginBottom: '2rem' }}>
                  <h2 style={{ fontSize: '15px', fontWeight: 700, marginBottom: '12px', color: '#1F2937' }}>1단계 · 사진 촬영</h2>
                  {!photo ? (
                    <label style={{ display: 'block', padding: '2.5rem 1rem', border: '2px dashed #667EEA', borderRadius: '16px', background: '#F3F4F6', color: '#667EEA', cursor: 'pointer', fontSize: '14px', fontWeight: 600, textAlign: 'center' }}>
                      <div style={{ fontSize: '44px', marginBottom: '8px' }}>📸</div>
                      여기를 눌러서 사진을 촬영해주세요
                      <input type="file" accept="image/*" capture="environment" onChange={handlePhotoSelect} style={{ display: 'none' }} />
                    </label>
                  ) : (
                    <div style={{ position: 'relative' }}>
                      <img src={photo} alt="위치 사진" style={{ width: '100%', borderRadius: '16px', display: 'block', border: '3px solid #667EEA' }} />
                      <label style={{ position: 'absolute', top: '12px', right: '12px', padding: '8px 14px', background: 'rgba(0,0,0,0.7)', color: 'white', border: 'none', borderRadius: '8px', cursor: 'pointer', fontSize: '12px', fontWeight: '600' }}>
                        다시 촬영
                        <input type="file" accept="image/*" capture="environment" onChange={handlePhotoSelect} style={{ display: 'none' }} />
                      </label>
                    </div>
                  )}
                </div>

                <div style={{ marginBottom: '2rem' }}>
                  <h2 style={{ fontSize: '15px', fontWeight: 700, marginBottom: '12px', color: '#1F2937' }}>2단계 · 위치 정보</h2>
                  
                  <div style={{ marginBottom: '14px' }}>
                    <label style={{ display: 'block', fontSize: '13px', fontWeight: 600, marginBottom: '6px', color: '#1F2937' }}>📍 장소 (선택)</label>
                    <input type="text" value={parkingLocation} onChange={(e) => setParkingLocation(e.target.value)} placeholder="예: 판교 현대백화점" style={{ width: '100%', padding: '12px', border: '1px solid #E5E7EB', borderRadius: '10px', fontSize: '13px', boxSizing: 'border-box', color: '#1F2937' }} />
                  </div>

                  <div style={{ marginBottom: '14px' }}>
                    <label style={{ fontSize: '13px', fontWeight: 600, marginBottom: '6px', color: '#1F2937', display: 'block' }}>🏷️ 주차 구역 (선택)</label>
                    <input type="text" value={parkingZone} onChange={(e) => setParkingZone(e.target.value)} placeholder="예: B4 E3" style={{ width: '100%', padding: '12px', border: '1px solid #E5E7EB', borderRadius: '10px', fontSize: '13px', boxSizing: 'border-box', color: '#1F2937' }} />
                  </div>

                  <div style={{ borderTop: '1px solid #E5E7EB', margin: '14px 0' }}></div>

                  <div>
                    <label style={{ display: 'block', fontSize: '13px', fontWeight: 600, marginBottom: '6px', color: '#1F2937' }}>📝 추가 설명 (선택)</label>
                    <input type="text" value={memo} onChange={(e) => setMemo(e.target.value)} placeholder="예: 5층 주차장 · 충전소 옆" style={{ width: '100%', padding: '12px', border: '1px solid #E5E7EB', borderRadius: '10px', fontSize: '13px', boxSizing: 'border-box', color: '#1F2937' }} />
                  </div>
                </div>

                <button onClick={saveParking} style={{ width: '100%', padding: '16px', background: 'linear-gradient(135deg, #667EEA 0%, #764BA2 100%)', color: 'white', border: 'none', borderRadius: '12px', fontSize: '16px', fontWeight: 700, cursor: 'pointer' }}>
                  위치 저장 🚗
                </button>
              </>
            )}

            {tab === 'records' && (
              <>
                <h2 style={{ fontSize: '16px', fontWeight: 700, marginBottom: '16px', color: '#1F2937' }}>📋 기록 ({parkingRecords.length})</h2>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '12px' }}>
                  {parkingRecords.map((record) => (
                    <div key={record.id} style={{ background: 'white', borderRadius: '12px', overflow: 'hidden', border: '2px solid #E5E7EB', cursor: 'pointer' }}>
                      <div style={{ position: 'relative', paddingBottom: '100%', overflow: 'hidden' }}>
                        <img src={record.photo} alt="주차 위치" style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', objectFit: 'cover' }} />
                        <div style={{ position: 'absolute', bottom: '8px', right: '8px', fontSize: '28px' }}>{getCarEmotion(record.timestamp)}</div>
                      </div>
                      <div style={{ padding: '10px', fontSize: '12px', color: '#6B7280' }}>
                        <div style={{ fontWeight: 600, color: '#1F2937', marginBottom: '4px' }}>{record.location || '위치 미지정'}</div>
                        <div>{getTimeString(record.timestamp)}</div>
                        <button onClick={() => deleteRecord(record.id)} style={{ marginTop: '8px', width: '100%', padding: '6px', background: '#FEE2E2', color: '#DC2626', border: 'none', borderRadius: '6px', fontSize: '11px', fontWeight: 600, cursor: 'pointer' }}>
                          삭제
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}

            {tab === 'settings' && (
              <>
                <h2 style={{ fontSize: '16px', fontWeight: 700, marginBottom: '16px', color: '#1F2937' }}>⚙️ 설정</h2>
                
                <div style={{ marginBottom: '2rem' }}>
                  <label style={{ display: 'block', fontSize: '14px', fontWeight: 600, marginBottom: '8px', color: '#1F2937' }}>
                    🚗 자동차 이름
                  </label>
                  <input type="text" value={carName} onChange={(e) => { setCarName(e.target.value); localStorage.setItem('car-name', e.target.value); }} style={{ width: '100%', padding: '12px', border: '1px solid #E5E7EB', borderRadius: '10px', fontSize: '14px', boxSizing: 'border-box', color: '#1F2937' }} />
                </div>

                <div style={{ marginBottom: '2rem' }}>
                  <label style={{ display: 'block', fontSize: '14px', fontWeight: 600, marginBottom: '12px', color: '#1F2937' }}>
                    🎨 자동차 색상
                  </label>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '10px' }}>
                    {['#FF6B6B', '#FFA500', '#FFD700', '#00D084', '#0084FF', '#9D4EDD'].map((color) => (
                      <button key={color} onClick={() => { setCarColor(color); localStorage.setItem('car-color', color); }} style={{ padding: '12px', background: color, border: carColor === color ? '3px solid #0066FF' : '1px solid #DDD', borderRadius: '10px', cursor: 'pointer' }}>
                        <CarSvg color={color} size={40} />
                      </button>
                    ))}
                  </div>
                </div>

                <div style={{ marginBottom: '2rem', padding: '16px', background: '#F9FAFB', borderRadius: '12px' }}>
                  <h3 style={{ fontSize: '15px', fontWeight: 700, marginBottom: '12px', color: '#1F2937' }}>😊 자동차 상태</h3>
                  <div style={{ fontSize: '13px', color: '#6B7280', lineHeight: '1.8' }}>
                    <div style={{ padding: '12px', background: '#ECFDF5', borderRadius: '8px', marginBottom: '8px', border: '1px solid #A7F3D0' }}>
                      <div style={{ fontWeight: 600, color: '#059669', marginBottom: '4px' }}>😊 0 ~ 2시간: 행복</div>
                      <div>붕붕이가 안전하게 기다리고 있어요</div>
                    </div>
                    <div style={{ padding: '12px', background: '#FEF3C7', borderRadius: '8px', marginBottom: '8px', border: '1px solid #FDE68A' }}>
                      <div style={{ fontWeight: 600, color: '#D97706', marginBottom: '4px' }}>😢 2 ~ 4시간: 슬픈</div>
                      <div>절 잊은 건 아니죠? 조금 심심해요</div>
                    </div>
                    <div style={{ padding: '12px', background: '#EDE9FE', borderRadius: '8px', border: '1px solid #DDD6FE' }}>
                      <div style={{ fontWeight: 600, color: '#7C3AED', marginBottom: '4px' }}>😴 4시간+: 졸린</div>
                      <div>졸려서 조금 자고 있을게요.</div>
                    </div>
                  </div>
                </div>
              </>
            )}
          </div>

          {alertMessage && (
            <div style={{ position: 'fixed', bottom: '100px', left: '50%', transform: 'translateX(-50%)', background: 'white', padding: '16px 24px', borderRadius: '12px', boxShadow: '0 4px 12px rgba(0,0,0,0.15)', zIndex: 1000 }}>
              {alertMessage}
            </div>
          )}

          <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, background: 'white', borderTop: '1px solid #E5E7EB', display: 'flex', justifyContent: 'space-around' }}>
            <button onClick={() => setTab('record')} style={{ flex: 1, padding: '16px', background: tab === 'record' ? '#667EEA' : 'white', color: tab === 'record' ? 'white' : '#6B7280', border: 'none', cursor: 'pointer', fontSize: '12px', fontWeight: 600 }}>
              📸 위치 저장
            </button>
            <button onClick={() => setTab('records')} style={{ flex: 1, padding: '16px', background: tab === 'records' ? '#667EEA' : 'white', color: tab === 'records' ? 'white' : '#6B7280', border: 'none', cursor: 'pointer', fontSize: '12px', fontWeight: 600 }}>
              📋 기록 ({parkingRecords.length})
            </button>
            <button onClick={() => setTab('settings')} style={{ flex: 1, padding: '16px', background: tab === 'settings' ? '#667EEA' : 'white', color: tab === 'settings' ? 'white' : '#6B7280', border: 'none', cursor: 'pointer', fontSize: '12px', fontWeight: 600 }}>
              ⚙️ 설정
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.render(<ParkingApp />, document.getElementById('root'));
  </script>
</body>
</html>
